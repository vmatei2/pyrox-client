app = "pyrox-api"
primary_region = "lhr"

[build]
  dockerfile = "Dockerfile"

[env]
  PYROX_DUCKDB_PATH = "/app/pyrox_duckdb"
  # latest.json pointer published by the hyrox_analysis pipeline; fetch_db
  # downloads and checksum-verifies the referenced artifact on boot.
  PYROX_DB_POINTER_URL = "https://d2wl4b7sx66tfb.cloudfront.net/db/latest.json"
  PYROX_API_ALLOW_ORIGINS = "https://pyrox-analytics.vercel.app,capacitor://localhost,ionic://localhost,http://localhost"
  # MCP DNS-rebinding protection is intentionally left off here. It validates the
  # Host/Origin headers and exists to stop a malicious site pivoting through a
  # victim's browser into a localhost-bound server. This endpoint is public,
  # read-only, no-auth, and behind Fly's HTTPS proxy, so it adds no security here
  # and only breaks browser/Electron MCP clients (e.g. the Claude web/Desktop
  # connector, which sends an Origin header). Setting PYROX_MCP_ALLOWED_HOSTS
  # re-enables it and will 403 those clients with "Invalid Origin header".

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
